services:
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    image: aegis-saas:latest
    container_name: aegis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - aegis_data:/app/server/subscription/data
      - aegis_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis_net

  # Reverse proxy + TLS. Aktifkan dengan profile 'proxy'.
  #   docker compose --profile proxy up -d
  # Pastikan VPS_DOMAIN sudah point ke IP VPS dan port 80/443 terbuka.
  nginx:
    image: nginx:1.27-alpine
    container_name: aegis-nginx
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - aegis
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/aegis.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - aegis_net

volumes:
  aegis_data:
  aegis_logs:

networks:
  aegis_net:
    driver: bridge
