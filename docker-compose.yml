services:
  # Backend SaaS (Midtrans, subscription, health) — hanya jaringan internal.
  # Next.js (web) mem-proxy /api/* ke sini (lihat web/next.config.ts & API_URL).
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    image: aegis-saas:latest
    container_name: aegis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
    expose:
      - "4000"
    volumes:
      - aegis_data:/app/server/subscription/data
      - aegis_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis_net

  # Marketing / UI (Next.js). Port 3000 = wajah publik ke browser.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: http://aegis:4000
    image: aegis-web:latest
    container_name: aegis-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_URL: http://aegis:4000
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      aegis:
        condition: service_healthy
    networks:
      - aegis_net

  # Reverse proxy + TLS. Aktifkan dengan profile 'proxy'.
  #   docker compose --profile proxy up -d
  # Traffic HTTP diarahkan ke **web** (Next). /api/* direwrite ke aegis di dalam Next.
  nginx:
    image: nginx:1.27-alpine
    container_name: aegis-nginx
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/aegis.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - aegis_net

volumes:
  aegis_data:
  aegis_logs:

networks:
  aegis_net:
    driver: bridge
