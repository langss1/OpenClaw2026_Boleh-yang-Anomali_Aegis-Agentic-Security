# Aegis SaaS — nginx reverse proxy
# Pakai bersama docker-compose profile 'proxy' atau native nginx di VPS.
# Ganti `aegis.example.com` dengan VPS_DOMAIN Anda.

upstream aegis_backend {
    server aegis:3000;        # Docker service Aegis SaaS (standalone Aegis-cli)
    # server 127.0.0.1:3000;  # gunakan ini jika nginx native (di luar docker)
    keepalive 32;
}

# --- HTTP (redirect ke HTTPS bila TLS aktif) ---
server {
    listen 80;
    listen [::]:80;
    server_name aegis.example.com;

    # ACME challenge untuk certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Jika sertifikat tersedia, redirect; jika tidak, langsung proxy.
    location / {
        # return 301 https://$host$request_uri;
        proxy_pass http://aegis_backend;
        include /etc/nginx/conf.d/aegis_proxy.inc;
    }
}

